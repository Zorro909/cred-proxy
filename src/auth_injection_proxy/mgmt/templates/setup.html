<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credential Setup</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { font-size: 1.5em; }
        .info { background: #f0f4f8; padding: 12px 16px; border-radius: 6px; margin-bottom: 20px; }
        .info p { margin: 4px 0; }
        .error { background: #fef2f2; color: #b91c1c; padding: 12px 16px; border-radius: 6px; margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-top: 16px; margin-bottom: 4px; }
        select, input, textarea { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        .fields { display: none; }
        .fields.active { display: block; }
        button { margin-top: 24px; padding: 10px 24px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        small { color: #6b7280; }
    </style>
</head>
<body>
    <h1>Credential Setup</h1>

    <div class="info">
        <p><strong>Domain:</strong> {{ domain }}</p>
        {% if reason %}<p><strong>Reason:</strong> {{ reason }}</p>{% endif %}
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/setup/{{ token }}">
        <label for="auth_type">Authentication Type</label>
        <select name="auth_type" id="auth_type" onchange="toggleFields()" required>
            <option value="">-- Select --</option>
            <option value="bearer" {% if auth_type == 'bearer' %}selected{% endif %}>Bearer Token</option>
            <option value="basic" {% if auth_type == 'basic' %}selected{% endif %}>Basic Auth</option>
            <option value="header" {% if auth_type == 'header' %}selected{% endif %}>Custom Header</option>
            <option value="query_param" {% if auth_type == 'query_param' %}selected{% endif %}>Query Parameter</option>
            <option value="oauth2_client_credentials" {% if auth_type == 'oauth2_client_credentials' %}selected{% endif %}>OAuth2 Client Credentials</option>
        </select>

        <div id="fields-bearer" class="fields">
            <label for="token">Token</label>
            <input type="password" name="token" id="token" placeholder="sk-...">
        </div>

        <div id="fields-basic" class="fields">
            <label for="username">Username</label>
            <input type="text" name="username" id="username">
            <label for="password">Password</label>
            <input type="password" name="password" id="password">
        </div>

        <div id="fields-header" class="fields">
            <label for="header_name">Header Name</label>
            <input type="text" name="header_name" id="header_name" placeholder="X-API-Key">
            <label for="header_value">Header Value</label>
            <input type="password" name="header_value" id="header_value">
        </div>

        <div id="fields-query_param" class="fields">
            <label for="param_name">Parameter Name</label>
            <input type="text" name="param_name" id="param_name" placeholder="api_key">
            <label for="param_value">Parameter Value</label>
            <input type="password" name="param_value" id="param_value">
        </div>

        <div id="fields-oauth2_client_credentials" class="fields">
            <label for="token_url">Token URL</label>
            <input type="url" name="token_url" id="token_url" placeholder="https://auth.example.com/oauth/token">
            <label for="client_id">Client ID</label>
            <input type="text" name="client_id" id="client_id">
            <label for="client_secret">Client Secret</label>
            <input type="password" name="client_secret" id="client_secret">
            <label for="scopes">Scopes <small>(comma-separated)</small></label>
            <input type="text" name="scopes" id="scopes" placeholder="read, write">
        </div>

        <button type="submit">Save Credential</button>
    </form>

    <script>
        function toggleFields() {
            document.querySelectorAll('.fields').forEach(el => el.classList.remove('active'));
            const type = document.getElementById('auth_type').value;
            if (type) {
                const el = document.getElementById('fields-' + type);
                if (el) el.classList.add('active');
            }
        }
        toggleFields();
    </script>
</body>
</html>
