# Auth Injection Proxy — Example Configuration

proxy:
  listen_port: 8080
  mgmt_port: 8081
  credential_request_ttl: 900  # seconds (default: 15 min)

credentials:
  # Bearer token example
  - id: "openai-prod"
    domain: "api.openai.com"
    path_prefix: "/v1/"
    enabled: true
    auth:
      type: bearer
      token: "sk-proj-your-openai-api-key-here"

  # Basic auth example
  # - id: "jira-basic"
  #   domain: "jira.example.com"
  #   enabled: true
  #   auth:
  #     type: basic
  #     username: "user@example.com"
  #     password: "api-token-here"

  # Custom header example
  # - id: "custom-api"
  #   domain: "api.example.com"
  #   enabled: true
  #   auth:
  #     type: header
  #     header_name: "X-API-Key"
  #     header_value: "your-api-key"

  # Query parameter example
  # - id: "legacy-api"
  #   domain: "legacy.example.com"
  #   enabled: true
  #   auth:
  #     type: query_param
  #     param_name: "api_key"
  #     param_value: "your-api-key"

  # OAuth2 client credentials example
  # - id: "oauth2-service"
  #   domain: "api.service.com"
  #   enabled: true
  #   auth:
  #     type: oauth2_client_credentials
  #     token_url: "https://auth.service.com/oauth/token"
  #     client_id: "your-client-id"
  #     client_secret: "your-client-secret"
  #     scopes:
  #       - "read"
  #       - "write"

  # External script example (e.g. GitHub App installation token)
  # - id: "github-app"
  #   domain: "api.github.com"
  #   enabled: true
  #   auth:
  #     type: external_script
  #     script: "./scripts/github-app-token.sh"
  #     env:
  #       GITHUB_APP_ID: "12345"
  #       GITHUB_PRIVATE_KEY_PATH: "/path/to/key.pem"
  #       GITHUB_INSTALLATION_ID: "67890"
  #     refresh_interval: 600
